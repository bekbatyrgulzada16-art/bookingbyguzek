<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUJO BODRUM | Cabana Booking by Gulzada</title>
    
    <style>
        :root {
            --lujo-orange: #FF6A00; /* Тот самый оранжевый */
            --lujo-dark: #0f0f0f;
            --lujo-card: rgba(26, 26, 26, 0.95);
            --available: #2ecc71;
            --white: #ffffff;
        }

        body {
            margin: 0;
            font-family: 'Avenir', sans-serif;
            background-color: var(--lujo-dark);
            background-image: linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.75)), url('lujo-beach.png');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: var(--white);
            min-height: 100vh;
        }

        /* Кнопка Инфо (как ты хотела) */
        .info-btn {
            position: fixed; top: 20px; right: 20px; width: 35px; height: 35px;
            border: 1px solid white; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer; z-index: 100;
        }

        /* Модальное окно ИНФО */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); z-index: 200; padding: 40px 20px; box-sizing: border-box; text-align: center;
        }

        .modal-content {
            max-width: 400px; margin: 0 auto; border: 1px solid var(--lujo-orange);
            padding: 25px; border-radius: 15px; background: var(--lujo-dark);
        }

        .color-example { display: flex; align-items: center; margin: 15px 0; font-size: 0.9rem; }
        .dot { width: 15px; height: 15px; border-radius: 50%; margin-right: 15px; }

        /* Главный экран */
        .hero { height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
        .hero h1 { font-size: 2.2rem; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 5px; }
        .hero h1 span { color: var(--lujo-orange); }
        .by-line { font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 40px; opacity: 0.8; text-transform: uppercase; }

        .btn-main {
            background-color: var(--lujo-orange); color: white; padding: 20px 40px;
            border: none; border-radius: 50px; font-size: 0.9rem; font-weight: bold; text-transform: uppercase;
        }

        /* Экран выбора зон */
        .zones-list { display: none; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 15px; }
        .btn-zone { 
            width: 280px; background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.3); 
            padding: 18px; border-radius: 12px; text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
        }

        /* Сетки кабан */
        .grid-container { display: none; padding: 20px; }
        .cabana-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-top: 20px; }
        .card { background: var(--lujo-card); border-radius: 12px; padding: 15px; border-left: 4px solid var(--available); text-align: left; }
        .card h3 { margin: 0 0 5px 0; font-size: 1rem; color: var(--lujo-orange); }
        .info-label { font-size: 0.65rem; color: #888; text-transform: uppercase; margin-top: 8px; }
        .info-data { font-size: 0.85rem; font-weight: bold; }
    </style>
</head>
<body>

    <div class="info-btn" onclick="showModal(true)">i</div>

    <div id="infoModal" class="modal">
        <div class="modal-content">
            <h2 style="color: var(--lujo-orange);">WELCOME</h2>
            <p style="font-size: 0.85rem; line-height: 1.5;">You can check real-time availability and make your reservation here.</p>
            <div class="color-example"><div class="dot" style="background: var(--available);"></div> Free — Green</div>
            <div class="color-example"><div class="dot" style="background: var(--lujo-orange);"></div> Booked — Orange</div>
            <div class="color-example"><div class="dot" style="background: #f1c40f;"></div> Complimentary — Yellow</div>
            <div class="color-example"><div class="dot" style="background: #3498db;"></div> Event — Blue</div>
            <button onclick="showModal(false)" style="margin-top: 20px; background: none; border: 1px solid white; color: white; padding: 10px 25px; border-radius: 20px;">BACK</button>
        </div>
    </div>

    <div id="home-screen" class="hero">
        <h1>LUJO <span>BODRUM</span></h1>
        <div class="by-line">Cabana Booking by Gulzada</div>
        <button class="btn-main" onclick="showZones()">Choose your cabana zone</button>
    </div>

    <div id="zones-screen" class="zones-list">
        <button onclick="goHome()" style="background:none; color:white; border:none; margin-bottom: 20px;">← BACK</button>
        <button class="btn-zone" onclick="openGrid('Escape', 21)">Escape (21)</button>
        <button class="btn-zone" onclick="openGrid('Lotus', 8)">Lotus (8)</button>
        <button class="btn-zone" onclick="openGrid('Joy Stone', 18)">Joy Stone (18)</button>
    </div>

    <div id="grid-screen" class="grid-container">
        <button onclick="showZones()" style="background:none; color:white; border:1px solid white; padding:8px 15px; border-radius:20px;">← BACK</button>
        <h2 id="zone-title" style="text-align:center; letter-spacing:5px; text-transform: uppercase; color: var(--lujo-orange);"></h2>
        <div id="cabana-grid" class="cabana-grid"></div>
    </div>

    <script>
        function showModal(s) { document.getElementById('infoModal').style.display = s ? 'block' : 'none'; }
        function showZones() {
            document.getElementById('home-screen').style.display = 'none';
            document.getElementById('grid-screen').style.display = 'none';
            document.getElementById('zones-screen').style.display = 'flex';
        }
        function goHome() {
            document.getElementById('home-screen').style.display = 'flex';
            document.getElementById('zones-screen').style.display = 'none';
        }
        function openGrid(name, count) {
            document.getElementById('zones-screen').style.display = 'none';
            document.getElementById('grid-screen').style.display = 'block';
            document.getElementById('zone-title').innerText = name + " Zone";
            
            const grid = document.getElementById('cabana-grid');
            grid.innerHTML = '';
            for(let i=1; i<=count; i++) {
                grid.innerHTML += `
                    <div class="card">
                        <h3>CABANA № ${i < 10 ? '0'+i : i}</h3>
                        <div class="info-label">Guest Room:</div>
                        <div class="info-data">Available</div>
                        <div class="info-label">Pension Type:</div>
                        <div class="info-data">BB / AI</div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
