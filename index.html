<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cabana Booking by Gulzada</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* ВСЕ ТВОИ ОРИГИНАЛЬНЫЕ СТИЛИ */
        body { font-family: 'Inter', sans-serif; background: #F4F3EF; margin: 0; padding: 20px; color: #333; }
        h1 { text-align: center; font-size: 32px; margin-bottom: 15px; color: #677D73; }
        button.info-btn { background-color: #677D73; color: #fff; padding: 10px 16px; border: none; border-radius: 25px; cursor: pointer; font-size: 16px; margin-bottom: 20px; }
        .section { background: #fff; padding: 15px; border-radius: 25px; margin-bottom: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        .section h2 { margin: 0; cursor: pointer; color: #677D73; }
        .content { display: none; margin-top: 15px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(100px,1fr)); gap: 10px; }
        .cell { background: #E9E7E2; padding: 10px; border-radius: 25px; text-align: center; cursor: pointer; transition:0.2s; font-size: 14px; border: 2px solid transparent; }
        .cell:hover { transform: scale(1.05); }
        .emoji { display: block; font-size: 20px; margin-bottom: 5px; }
        .status-free { background:#A7CFA5; border-color:#8FA79C; }
        .status-booked { background:#E26D6D; border-color:#C55B5B; }
        .status-complimentary { background:#E8D27C; border-color:#C9B35C; }
        .status-event { background:#7DAAE3; border-color:#5F88C0; }
        textarea.notes { width: 100%; padding: 10px; border-radius: 25px; border:1px solid #ccc; margin-top: 5px; resize: vertical; box-sizing: border-box; }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); justify-content:center; align-items:center; z-index: 9999; }
        .modal-content { background:#fff; padding:20px; border-radius:12px; width:320px; }
        label { display:block; margin-top:10px; font-weight:bold; }
        input, select, textarea { width:100%; margin-top:5px; padding:5px; border-radius:8px; border:1px solid #ccc; box-sizing: border-box; }
        .save-btn { background:#677D73; color:white; border:none; padding:10px; border-radius:10px; margin-top:15px; cursor:pointer; width:100%; }
    </style>
</head>
<body>

<h1>Бронирование беседок от Gulzada</h1>
<button class="info-btn" onclick="toggleInfo()">ℹ️ Информация</button>

<div class="section" id="info">
    <h2>Информация</h2>
    <div class="content">
        <h3>Символы и Цвета</h3>
        <p>Здесь твои списки эмодзи...</p>
    </div>
</div>

<div class="section">
    <h2 onclick="toggle('board')">📌 Доска объявлений</h2>
    <div class="content" id="board">
        <textarea id="boardText" class="notes" rows="5" placeholder="Напишите здесь..."></textarea>
        <button class="save-btn" onclick="saveBoard()">Сохранить на доске</button>
    </div>
</div>

<div id="cabanaSections"></div>

<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Редактировать беседку 📝</h3>
        <label>Номер комнаты</label><input type="text" id="modalRoom">
        <label>Кем продано</label><input type="text" id="modalSold">
        <label>Статус</label>
        <select id="modalStatus">
            <option value="free">Свободно</option>
            <option value="booked">Занято</option>
            <option value="complimentary">Икрам</option>
            <option value="event">Мероприятие</option>
        </select>
        <label>Эмодзи</label>
        <select id="modalEmoji">
            <option value="">Нет</option>
            <option value="♿">♿</option><option value="👶">👶</option><option value="🎂">🎂</option>
        </select>
        <label>Заметки 📝</label>
        <textarea id="modalNotes" class="notes" rows="3"></textarea>
        <button class="save-btn" onclick="saveCell()">Сохранить изменения</button>
    </div>
</div>

<script>
// --- ВСТАВЬ СВОИ ДАННЫЕ ТУТ ---
const SUPABASE_URL = 'URL_ТВОЕГО_ПРОЕКТА'; 
const SUPABASE_KEY = 'ТВОЙ_ANON_KEY';
const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const tableName = 'cabanabyguzek';

const cabanasData = [
    {name:'Escape', count:21},
    {name:'Lotus', count:8},
    {name:'Joystone', count:18}
];

let cabanas = {};

function toggleInfo(){
    const info = document.getElementById('info').querySelector('.content');
    info.style.display = info.style.display === 'block' ? 'none' : 'block';
}

function toggle(id){
    const el=document.getElementById(id);
    el.style.display = el.style.display==='block'?'none':'block';
}

// ЗАГРУЗКА ДАННЫХ
async function loadEverything() {
    // 1. Загружаем доску
    const { data: bData } = await _supabase.from(tableName).select('*').eq('name', 'board').single();
    if(bData) document.getElementById('boardText').value = bData.info;

    // 2. Загружаем беседки
    const { data: cData } = await _supabase.from(tableName).select('*').neq('name', 'board');
    
    // Чистим старые данные
    cabanas = {};
    cData.forEach(row => {
        cabanas[row.name] = JSON.parse(row.info);
    });

    renderAll();
}

function renderAll() {
    const container = document.getElementById('cabanaSections');
    container.innerHTML = '';
    cabanasData.forEach(sec => {
        const sectionDiv = document.createElement('div');
        sectionDiv.className='section';
        sectionDiv.innerHTML = `<h2 onclick="toggle('${sec.name}')">🏝️ ${sec.name}</h2><div class="content" id="${sec.name}" style="display:block"><div class="grid"></div></div>`;
        container.appendChild(sectionDiv);
        
        const grid = sectionDiv.querySelector('.grid');
        for(let i=1; i<=sec.count; i++) {
            const key = `${sec.name}_${i}`;
            const data = cabanas[key] || {room:'', sold:'', status:'free', emoji:'', notes:''};
            const cell = document.createElement('div');
            cell.className = 'cell status-' + data.status;
            cell.innerHTML = `<span class="emoji">${data.emoji || '🌴'}</span>${sec.name} ${i}<br>R: ${data.room||'-'}`;
            cell.onclick = () => openModal(sec.name, i, data);
            grid.appendChild(cell);
        }
    });
}

// СОХРАНЕНИЕ ДОСКИ
async function saveBoard() {
    const val = document.getElementById('boardText').value;
    await _supabase.from(tableName).upsert({ name: 'board', info: val });
}

// МОДАЛКА
let curS, curI;
function openModal(sec, i, data) {
    curS = sec; curI = i;
    document.getElementById('modalRoom').value = data.room;
    document.getElementById('modalSold').value = data.sold;
    document.getElementById('modalStatus').value = data.status;
    document.getElementById('modalEmoji').value = data.emoji;
    document.getElementById('modalNotes').value = data.notes;
    document.getElementById('modal').style.display = 'flex';
}

async function saveCell() {
    const key = `${curS}_${curI}`;
    const obj = {
        room: document.getElementById('modalRoom').value,
        sold: document.getElementById('modalSold').value,
        status: document.getElementById('modalStatus').value,
        emoji: document.getElementById('modalEmoji').value,
        notes: document.getElementById('modalNotes').value
    };
    await _supabase.from(tableName).upsert({ name: key, info: JSON.stringify(obj) });
    document.getElementById('modal').style.display = 'none';
}

// REALTIME (Обновление у всех)
_supabase.channel('room1').on('postgres_changes', { event: '*', schema: 'public', table: tableName }, () => {
    loadEverything();
}).subscribe();

document.getElementById('modal').onclick = function(e){ if(e.target==this) this.style.display='none'; }

// Запуск
loadEverything();
</script>
</body>
</html>
