<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CABANA BOOKING BY GULZADA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --sand: #F6F2EA; --olive: #7D8B6A; --booked: #FF4B2B; --villas: #A020F0; --comp: #FFD700; }
        body { margin: 0; font-family: sans-serif; background: var(--sand); padding-bottom: 50px; }
        .header { padding: 30px; text-align: center; font-weight: 900; text-transform: uppercase; letter-spacing: 2px; }
        .nav-area { padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-luxe { background: var(--olive); color: white; padding: 20px; border-radius: 40px; border: none; font-weight: 900; display: flex; justify-content: space-between; width: 100%; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: white; border-radius: 15px; min-height: 120px; padding: 10px; text-align: center; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: flex; flex-direction: column; justify-content: space-between; }
        .st-booked { background: var(--booked); color: white; }
        .st-villas { background: var(--villas); color: white; }
        .st-comp { background: var(--comp); color: black; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; padding: 20px; border-radius: 30px; }
        input, select { width: 100%; padding: 15px; margin: 5px 0; border-radius: 10px; border: 1px solid #ccc; font-size: 1rem; box-sizing: border-box; }
    </style>
</head>
<body>

    <div id="home">
        <div class="header">CABANA BOOKING<br>BY GULZADA</div>
        <div class="nav-area">
            <button class="btn-luxe" onclick="render('Escape', 21)">ESCAPE AREA <span>🌊</span></button>
            <button class="btn-luxe" onclick="render('Lotus', 8)">LOTUS PIER <span>🪷</span></button>
            <button class="btn-luxe" onclick="render('JoyStone', 18)">JOYSTONE <span>💎</span></button>
        </div>
    </div>

    <div id="zone" style="display:none;">
        <button onclick="location.reload()" style="margin: 20px; padding: 10px 20px; border-radius: 20px; border: none; background: #ddd; font-weight: bold;">← BACK</button>
        <h2 id="z-title" style="text-align:center; text-transform:uppercase;"></h2>
        <div id="grid" class="grid"></div>
    </div>

    <div id="edit" class="modal">
        <div class="modal-content">
            <h3 id="e-title">EDIT</h3>
            <input type="text" id="i-room" placeholder="Room Number">
            <input type="text" id="i-guest" placeholder="Guest Name">
            <select id="i-sticker">
                <option value="">No Sticker</option>
                <option value="🎂">🎂 Birthday / Doğum Günü</option>
                <option value="⭐">⭐ VIP Guest</option>
                <option value="❤️">❤️ Honeymoon / Balayı</option>
                <option value="⚠️">⚠️ Allergy / Alerji</option>
                <option value="🍉">🍉 Fruits / Meyve</option>
                <option value="🧸">🧸 Family / Aile</option>
                <option value="🔕">🔕 Quiet / Sessiz</option>
                <option value="🧊">🧊 Ice / Buz</option>
                <option value="🌊">🌊 Front Row / Ön Sıra</option>
                <option value="🚫">🚫 No Swim / Yüzmüyor</option>
                <option value="🥂">🥂 Celeb / Kutlama</option>
            </select>
            <select id="i-status">
                <option value="free">Boş (Free)</option>
                <option value="booked">Dolu (Booked)</option>
                <option value="villas">Villalar (Villas)</option>
                <option value="comp">İkram (Comp)</option>
            </select>
            <button onclick="save()" style="width:100%; padding:20px; background:var(--olive); color:white; border-radius:15px; border:none; margin-top:10px; font-weight:bold;">SAVE</button>
            <button onclick="document.getElementById('edit').style.display='none'" style="width:100%; background:none; border:none; color:gray; margin-top:10px;">Cancel</button>
        </div>
    </div>

    <script>
        const config = {
            apiKey: "AIzaSyB9RaIynSU_EMATYOq8xCT2uySnV-2k6G8",
            databaseURL: "https://cabanaspace-default-rtdb.firebaseio.com",
            projectId: "cabanaspace"
        };
        firebase.initializeApp(config);
        const db = firebase.database();
        let curZ, curI;

        function render(name, count) {
            curZ = name;
            document.getElementById('home').style.display = 'none';
            document.getElementById('zone').style.display = 'block';
            document.getElementById('z-title').innerText = name;
            
            const g = document.getElementById('grid');
            g.innerHTML = '';
            
            // Сначала создаем пустые ячейки, чтобы они ТОЧНО были на экране
            for(let i=1; i<=count; i++) {
                g.innerHTML += `<div id="c-${i}" class="card" onclick="openE(${i})"><b>${name} ${i}</b><br><span id="r-${i}">...</span><br><span id="s-${i}"></span></div>`;
            }

            // Потом подтягиваем данные из базы
            db.ref('zones/'+name).on('value', snap => {
                const data = snap.val() || {};
                for(let i=1; i<=count; i++) {
                    const c = data[i] || {room:'EMPTY', status:'free', sticker:''};
                    const el = document.getElementById('c-'+i);
                    el.className = 'card st-' + c.status;
                    document.getElementById('r-'+i).innerText = c.room;
                    document.getElementById('s-'+i).innerText = c.sticker || '';
                }
            });
        }

        function openE(id) {
            curI = id;
            document.getElementById('edit').style.display = 'flex';
        }

        function save() {
            db.ref('zones/'+curZ+'/'+curI).set({
                room: document.getElementById('i-room').value || 'EMPTY',
                guest: document.getElementById('i-guest').value,
                sticker: document.getElementById('i-sticker').value,
                status: document.getElementById('i-status').value
            });
            document.getElementById('edit').style.display = 'none';
        }
    </script>
</body>
</html>
