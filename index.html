<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LUJO | CABANA VIBE</title>
    <style>
        :root {
            --orange: #FF6A00;
            /* Сочные, прозрачные цвета статусов */
            --st-free: rgba(46, 204, 113, 0.5);   /* Зеленый мармелад */
            --st-booked: rgba(255, 106, 0, 0.5); /* Оранжевый мед */
            --st-comp: rgba(241, 196, 15, 0.5);  /* Лимонный сок */
            --st-event: rgba(52, 152, 219, 0.5); /* Морская волна */
            --st-vip: rgba(155, 89, 182, 0.5);   /* Виноград */
        }

        body {
            margin: 0; font-family: 'Avenir', sans-serif; color: white;
            /* ФОН: Красивое фото пляжа с размытием */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), 
                        url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; overflow-x: hidden;
        }

        .container { padding: 20px; text-align: center; backdrop-filter: blur(5px); min-height: 100vh; }

        /* ГЛАВНЫЙ ЭКРАН */
        .hero h1 { font-size: 0.7rem; letter-spacing: 5px; text-transform: uppercase; margin-top: 30px; }
        .hero h2 { font-size: 1.8rem; font-weight: 300; margin-bottom: 40px; }

        .btn-glass {
            width: 100%; max-width: 300px; padding: 20px; margin: 10px 0;
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px; color: white; font-size: 0.9rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            backdrop-filter: blur(10px); transition: 0.3s;
        }
        .btn-glass:hover { background: rgba(255, 255, 255, 0.3); }
        .btn-orange { background: var(--orange); border: none; box-shadow: 0 10px 20px rgba(255, 106, 0, 0.3); }

        /* СЕТКА КАБАН (3 В РЯД) */
        .cabana-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
            max-width: 500px; margin: 20px auto;
        }

        .cabana-card {
            background: rgba(255, 255, 255, 0.15); /* Эффект стекла */
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 18px; padding: 12px 5px; min-height: 110px;
            display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(15px); transition: 0.2s; color: white;
        }
        .cabana-card:active { transform: scale(0.95); }

        .cab-num { font-size: 0.6rem; opacity: 0.7; font-weight: bold; }
        .room-num { font-size: 1.2rem; font-weight: 900; margin: 4px 0; text-shadow: 0 2px 4px rgba(0,0,0,0.3); }
        .guest-name { font-size: 0.65rem; font-weight: bold; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
        .seller-info { font-size: 0.55rem; opacity: 0.8; margin-top: 5px; font-style: italic; border-top: 1px solid rgba(255,255,255,0.1); padding-top: 3px; }

        /* ЦВЕТА СТАТУСОВ */
        .status-free { background: var(--st-free); }
        .status-booked { background: var(--st-booked); }
        .status-comp { background: var(--st-comp); }
        .status-event { background: var(--st-event); }
        .status-vip { background: var(--st-vip); }

        /* ПАНЕЛЬ УПРАВЛЕНИЯ */
        .admin-panel {
            display: none; position: fixed; bottom: 0; left: 0; width: 100%;
            background: rgba(255, 255, 255, 0.95); color: #333; padding: 25px;
            border-radius: 30px 30px 0 0; box-sizing: border-box; z-index: 5000;
        }
        .admin-input {
            width: 100%; padding: 15px; margin-bottom: 10px; border-radius: 15px;
            border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box;
        }
        .color-row { display: flex; justify-content: space-between; margin: 15px 0; }
        .color-opt { width: 45px; height: 45px; border-radius: 50%; border: 3px solid transparent; }
        .color-opt.active { border-color: var(--orange); transform: scale(1.1); }

    </style>
</head>
<body>

<div class="container">
    <div id="hero-screen" class="hero">
        <h1>Lujo Bodrum</h1>
        <h2>Cabana Vibes</h2>
        <button class="btn-glass btn-orange" onclick="showScreen('zones-screen')">View Zones</button>
        <button class="btn-glass" onclick="openStaffBoard()">Staff Board</button>
        <button class="btn-glass" style="font-size:0.7rem; opacity:0.8;" onclick="alert('Legend: Green=Free, Orange=Booked, Yellow=Comp, Blue=Event, Purple=VIP')">Colors Info</button>
    </div>

    <div id="zones-screen" style="display:none;">
        <h2 style="font-weight: 300; margin: 40px 0;">Where to?</h2>
        <button class="btn-glass" onclick="openZone('Escape', 21)">Escape</button>
        <button class="btn-glass" onclick="openZone('Lotus', 8)">Lotus</button>
        <button class="btn-glass" onclick="openZone('Joy Stone', 18)">Joy Stone</button>
        <button onclick="showScreen('hero-screen')" style="background:none; border:none; color:white; margin-top:20px; display:block; width:100%;">← Home</button>
    </div>

    <div id="grid-screen" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <button onclick="showScreen('zones-screen')" style="background:none; border:none; color:white; font-size:1.5rem;">←</button>
            <h2 id="zone-title" style="text-transform:uppercase; letter-spacing:3px;"></h2>
            <div style="width:30px;"></div>
        </div>
        <div id="cabana-grid" class="cabana-grid"></div>
    </div>
</div>

<div id="admin-panel" class="admin-panel">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
        <h3 id="admin-header" style="margin:0;">Edit Cabana</h3>
        <div onclick="closeAdmin()" style="font-size:2rem; cursor:pointer;">×</div>
    </div>
    <input type="text" id="in-room" class="admin-input" placeholder="Room (e.g. 2201)">
    <input type="text" id="in-guest" class="admin-input" placeholder="Guest Name">
    <input type="text" id="in-seller" class="admin-input" placeholder="Sold by (Your Name)">
    
    <div class="color-row">
        <div class="color-opt" id="c-free" style="background:var(--st-free)" onclick="selectColor('free')"></div>
        <div class="color-opt" id="c-booked" style="background:var(--st-booked)" onclick="selectColor('booked')"></div>
        <div class="color-opt" id="c-comp" style="background:var(--st-comp)" onclick="selectColor('comp')"></div>
        <div class="color-opt" id="c-event" style="background:var(--st-event)" onclick="selectColor('event')"></div>
        <div class="color-opt" id="c-vip" style="background:var(--st-vip)" onclick="selectColor('vip')"></div>
    </div>
    
    <button class="btn-glass btn-orange" style="max-width:100%; width:100%; color:white;" onclick="saveCabana()">Update Cabana</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('lujo_v5_db')) || {};
    let currentId = null;
    let selectedStatus = 'free';

    function showScreen(id) {
        document.getElementById('hero-screen').style.display = 'none';
        document.getElementById('zones-screen').style.display = 'none';
        document.getElementById('grid-screen').style.display = 'none';
        document.getElementById(id).style.display = 'block';
    }

    function openZone(name, count) {
        showScreen('grid-screen');
        document.getElementById('zone-title').innerText = name;
        const grid = document.getElementById('cabana-grid');
        grid.innerHTML = '';
        for(let i=1; i<=count; i++) {
            let id = name + i;
            let data = db[id] || { room: 'FREE', guest: '', seller: '', status: 'free' };
            grid.innerHTML += `
                <div class="cabana-card status-${data.status}" onclick="editCabana('${id}', ${i}, '${name}')">
                    <span class="cab-num">CAB #${i}</span>
                    <span class="room-num">${data.room}</span>
                    <span class="guest-name">${data.guest || '-'}</span>
                    <span class="seller-info">By: ${data.seller || '-'}</span>
                </div>`;
        }
    }

    function editCabana(id, num, zone) {
        currentId = id;
        let data = db[id] || { room: '', guest: '', seller: '', status: 'free' };
        document.getElementById('admin-header').innerText = zone + ' #' + num;
        document.getElementById('in-room').value = data.room === 'FREE' ? '' : data.room;
        document.getElementById('in-guest').value = data.guest;
        document.getElementById('in-seller').value = data.seller;
        selectColor(data.status);
        document.getElementById('admin-panel').style.display = 'block';
    }

    function selectColor(s) {
        selectedStatus = s;
        document.querySelectorAll('.color-opt').forEach(el => el.classList.remove('active'));
        document.getElementById('c-' + s).classList.add('active');
    }

    function saveCabana() {
        db[currentId] = {
            room: document.getElementById('in-room').value.toUpperCase() || 'FREE',
            guest: document.getElementById('in-guest').value,
            seller: document.getElementById('in-seller').value,
            status: selectedStatus
        };
        localStorage.setItem('lujo_v5_db', JSON.stringify(db));
        closeAdmin();
        openZone(currentId.replace(/[0-9]/g, ''));
    }

    function closeAdmin() { document.getElementById('admin-panel').style.display = 'none'; }
    function openStaffBoard() { alert("Staff board is coming soon! Keep it up!"); }
</script>

</body>
</html>
