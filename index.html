<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CABANA BOOKING BY GULZADA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root {
            --sand-bg: #F6F2EA; --white: #FFFFFF; --olive: #7D8B6A; --charcoal: #2C2C2C;
            --st-booked: #FF4B2B; --st-free: #FFFFFF; --st-villas: #A020F0; --st-comp: #FFD700;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--sand-bg); padding-bottom: 30px; }
        .header { padding: 30px 20px; text-align: center; }
        .header h1 { font-size: 1.5rem; letter-spacing: 2px; text-transform: uppercase; margin: 0; font-weight: 900; }
        .daily-section { padding: 0 20px 20px; }
        .daily-card { background: var(--white); padding: 15px; border-radius: 20px; border: 2px solid var(--olive); font-weight: 800; }
        .nav-area { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-luxe { background: var(--olive); color: white; padding: 20px; border-radius: 40px; display: flex; justify-content: space-between; align-items: center; font-weight: 900; border: none; font-size: 0.9rem; }
        .cabana-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
        .cab-card { border-radius: 15px; padding: 10px 5px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; background: white; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .cab-room { font-size: 1.1rem; font-weight: 900; display: block; margin: 5px 0; }
        .cab-sticker { font-size: 1.3rem; }
        .st-booked { background: var(--st-booked); color: white; }
        .st-free { background: var(--st-free); border: 1px solid #ddd; }
        .st-villas { background: var(--st-villas); color: white; }
        .st-comp { background: var(--st-comp); color: black; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; padding: 25px; border-radius: 30px; }
        .input-luxe { width: 100%; border: 1px solid #ddd; padding: 12px; margin-bottom: 10px; border-radius: 10px; box-sizing: border-box; font-weight: 700; }
        .status-btn { flex: 1; height: 40px; border-radius: 10px; border: 2px solid #eee; }
    </style>
</head>
<body>

    <div id="home-view">
        <header class="header"><h1>CABANA BOOKING BY GULZADA</h1></header>
        <div class="daily-section">
            <div class="daily-card" onclick="editDaily()">
                <div id="daily-val">Loading notes...</div>
            </div>
        </div>
        <nav class="nav-area">
            <button class="btn-luxe" onclick="openZone('Escape', 21)">ESCAPE AREA <span>🌊</span></button>
            <button class="btn-luxe" onclick="openZone('Lotus', 8)">LOTUS PIER <span>🪷</span></button>
            <button class="btn-luxe" onclick="openZone('JoyStone', 18)">JOYSTONE ZONE <span>💎</span></button>
        </nav>
    </div>

    <div id="zone-view" style="display:none;">
        <div style="padding:20px; display:flex; align-items:center; gap:15px;">
            <button onclick="goHome()" style="background:none; border:none; font-size:1.5rem;">←</button>
            <h2 id="zone-title" style="margin:0;"></h2>
        </div>
        <div id="cabana-grid" class="cabana-grid"></div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3 id="edit-header">EDIT</h3>
            <input type="text" id="in-room" class="input-luxe" placeholder="Room Number">
            <input type="text" id="in-guest" class="input-luxe" placeholder="Guest Name">
            <select id="in-sticker" class="input-luxe">
                <option value="">No Sticker</option>
                <option value="🎂">🎂 Birthday</option><option value="⭐">⭐ VIP</option><option value="❤️">❤️ Honeymoon</option>
                <option value="⚠️">⚠️ Allergy</option><option value="🍉">🍉 Fruits</option><option value="🧸">🧸 Family</option>
                <option value="🔕">🔕 Quiet</option><option value="🧊">🧊 Ice</option><option value="🌊">🌊 Front Row</option>
                <option value="🚫">🚫 No Swim</option><option value="🥂">🥂 Celeb</option>
            </select>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <div onclick="setSt('free')" id="b-free" class="status-btn" style="background:white"></div>
                <div onclick="setSt('booked')" id="b-booked" class="status-btn" style="background:var(--st-booked)"></div>
                <div onclick="setSt('villas')" id="b-villas" class="status-btn" style="background:var(--st-villas)"></div>
                <div onclick="setSt('comp')" id="b-comp" class="status-btn" style="background:var(--st-comp)"></div>
            </div>
            <button onclick="save()" style="width:100%; padding:15px; background:var(--olive); color:white; border:none; border-radius:15px; font-weight:900;">SAVE</button>
            <button onclick="closeModal()" style="width:100%; background:none; border:none; margin-top:10px; color:gray;">Cancel</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB9RaIynSU_EMATYOq8xCT2uySnV-2k6G8",
            databaseURL: "https://cabanaspace-default-rtdb.firebaseio.com",
            projectId: "cabanaspace"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let czName, czCount, currentId, selectedStatus = 'free';

        db.ref('notes').on('value', s => { document.getElementById('daily-val').innerText = s.val() || "Tap to add notes..."; });

        function openZone(name, count) {
            czName = name; czCount = count;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('zone-view').style.display = 'block';
            document.getElementById('zone-title').innerText = name;
            db.ref('zones/' + name).on('value', s => {
                const data = s.val() || {};
                const grid = document.getElementById('cabana-grid');
                grid.innerHTML = '';
                for(let i=1; i<=count; i++) {
                    let c = data[i] || { room: 'EMPTY', status: 'free', sticker: '' };
                    grid.innerHTML += `<div class="cab-card st-${c.status}" onclick="edit(${i},'${c.room}','${c.status}','${c.sticker}','${c.guest}')">
                        <small>${name} ${i}</small><span class="cab-room">${c.room}</span><span class="cab-sticker">${c.sticker || ''}</span></div>`;
                }
            });
        }

        function edit(id, room, status, sticker, guest) {
            currentId = id;
            document.getElementById('in-room').value = room === 'EMPTY' ? '' : room;
            document.getElementById('in-guest').value = guest || '';
            document.getElementById('in-sticker').value = sticker || '';
            setSt(status);
            document.getElementById('edit-modal').style.display = 'flex';
        }

        function setSt(s) {
            selectedStatus = s;
            ['free','booked','villas','comp'].forEach(x => {
                document.getElementById('b-'+x).style.border = (x === s) ? '3px solid black' : '2px solid #eee';
            });
        }

        function save() {
            db.ref('zones/' + czName + '/' + currentId).set({
                room: document.getElementById('in-room').value || 'EMPTY',
                guest: document.getElementById('in-guest').value || '',
                sticker: document.getElementById('in-sticker').value || '',
                status: selectedStatus
            });
            closeModal();
        }

        function editDaily() {
            let val = prompt("Notes:", document.getElementById('daily-val').innerText);
            if(val !== null) db.ref('notes').set(val);
        }
        function closeModal() { document.getElementById('edit-modal').style.display = 'none'; }
        function goHome() { document.getElementById('home-view').style.display = 'block'; document.getElementById('zone-view').style.display = 'none'; }
    </script>
</body>
</html>
