<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CABANA BOOKING BY GULZADA</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #F4F3EF;
            margin: 0;
            padding: 20px;
        }

        .section {
            background: white;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 10px;
        }

        .section h2 {
            margin: 0;
            cursor: pointer;
        }

        .content {
            display: none;
            margin-top: 10px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill,minmax(120px,1fr));
            gap: 10px;
        }

        .cell {
            padding: 10px;
            border-radius: 8px;
            cursor: pointer;
            color: black;
            font-size: 14px;
            text-align: center;
        }

        .status-free { background: white; border: 2px solid #2ecc71; }
        .status-booked { background: #ff6a00; color: white; }
        .status-comment { background: yellow; }
        .status-compliment { background: #c4a7ff; }

        /* MODAL */
        #modal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            justify-content: center;
            align-items: center;
        }

        #modal .modal-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            width: 300px;
        }

        input, select, textarea {
            width: 100%;
            margin-bottom: 10px;
            padding: 8px;
        }
    </style>
</head>

<body>

<h1>Cabana Booking by Gulzada</h1>

<!-- BOARD -->
<div class="section">
    <h2 onclick="toggleInfo()">📋 Notes</h2>
    <div class="content" id="info">
        <textarea id="boardText" rows="4"></textarea>
        <button onclick="saveBoard()">Save Notes</button>
    </div>
</div>

<!-- CABANA SECTIONS -->
<div id="cabanaSections"></div>

<!-- MODAL -->
<div id="modal">
    <div class="modal-box">
        <h3>Edit Cabana</h3>

        <label>Room</label>
        <input id="modalRoom">

        <label>Sold by</label>
        <input id="modalSold">

        <label>Status</label>
        <select id="modalStatus">
            <option value="free">Free</option>
            <option value="booked">Booked</option>
            <option value="comment">Comment</option>
            <option value="compliment">Compliment</option>
        </select>

        <label>Emoji</label>
        <input id="modalEmoji">

        <label>Notes</label>
        <textarea id="modalNotes" rows="3"></textarea>

        <button onclick="saveCell()">Save</button>
    </div>
</div>

<script>
/* ----------------- TOGGLE ------------------ */
function toggleInfo(){
    const info = document.getElementById('info').querySelector('.content');
    info.style.display = info.style.display === 'block' ? 'none' : 'block';
}

function toggle(id){
    const el = document.getElementById(id);
    el.style.display = el.style.display === 'block' ? 'none' : 'block';
}

/* ----------------- CABANAS ------------------ */
const cabanasData = [
    {name:'Escape', count:21},
    {name:'Lotus', count:8},
    {name:'Joystone', count:18}
];

let cabanas = JSON.parse(localStorage.getItem('cabanas')) || {};

cabanasData.forEach(sec => {
    if(!cabanas[sec.name]) {
        cabanas[sec.name] = [];
        for(let i = 1; i <= sec.count; i++){
            cabanas[sec.name].push({
                room:'',
                sold:'',
                status:'free',
                emoji:'',
                notes:''
            });
        }
    }
});

/* ----------------- BOARD ------------------ */
document.getElementById('boardText').value = localStorage.getItem('board') || '';

function saveBoard(){
    localStorage.setItem('board', document.getElementById('boardText').value);
    alert('Saved!');
}

/* ----------------- RENDER SECTIONS ------------------ */
const cabanaSections = document.getElementById('cabanaSections');

cabanasData.forEach(sec => {
    const sectionDiv = document.createElement('div');
    sectionDiv.className = 'section';

    sectionDiv.innerHTML = `
        <h2 onclick="toggle('${sec.name}')">🏝️ ${sec.name}</h2>
        <div class="content" id="${sec.name}">
            <div class="grid"></div>
        </div>
    `;

    cabanaSections.appendChild(sectionDiv);
    renderGrid(sec.name);
});

/* ----------------- RENDER GRID ------------------ */
function renderGrid(secName){
    const grid = document.getElementById(secName).querySelector('.grid');
    grid.innerHTML = '';

    cabanas[secName].forEach((c, i) => {
        const cell = document.createElement('div');
        cell.className = `cell status-${c.status}`;

        cell.innerHTML = `
            <span>${c.emoji}</span><br>
            ${secName} ${i+1}<br>
            Room: ${c.room || '-'}<br>
            Sold: ${c.sold || '-'}
        `;

        cell.onclick = () => openModal(secName, i);
        grid.appendChild(cell);
    });
}

/* ----------------- MODAL ------------------ */
let currentSec, currentIndex;

function openModal(sec, i){
    currentSec = sec;
    currentIndex = i;

    const c = cabanas[sec][i];

    modalRoom.value = c.room;
    modalSold.value = c.sold;
    modalStatus.value = c.status;
    modalEmoji.value = c.emoji;
    modalNotes.value = c.notes;

    modal.style.display = 'flex';
}

function saveCell(){
    cabanas[currentSec][currentIndex] = {
        room: modalRoom.value,
        sold: modalSold.value,
        status: modalStatus.value,
        emoji: modalEmoji.value,
        notes: modalNotes.value
    };

    localStorage.setItem('cabanas', JSON.stringify(cabanas));

    renderGrid(currentSec);
    modal.style.display = 'none';
}

modal.onclick = e => {
    if(e.target === modal){
        modal.style.display = 'none';
    }
};
</script>

</body>
</html>
