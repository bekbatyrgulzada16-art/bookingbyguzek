<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CABANA BOOKING BY GULZADA</title>
    <style>
        :root {
            --orange: #FF6A00;
            --st-free: rgba(46, 204, 113, 0.5);
            --st-booked: rgba(255, 106, 0, 0.5);
            --st-comp: rgba(241, 196, 15, 0.5);
            --st-event: rgba(52, 152, 219, 0.5);
            --st-vip: rgba(155, 89, 182, 0.5);
        }

        body {
            margin: 0; font-family: 'Avenir', sans-serif; color: white;
            background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?q=80&w=2073&auto=format&fit=crop');
            background-size: cover; background-position: center; background-attachment: fixed;
            transition: background 0.5s ease; min-height: 100vh;
        }

        .container { padding: 20px; text-align: center; backdrop-filter: blur(3px); }

        /* HEADER */
        .main-header { margin-top: 30px; margin-bottom: 30px; }
        .main-header h1 { font-size: 1.8rem; font-weight: 300; margin: 0; text-shadow: 0 2px 10px rgba(0,0,0,0.5); }
        .main-header p { font-size: 0.7rem; letter-spacing: 4px; text-transform: uppercase; color: var(--orange); margin-top: 5px; font-weight: bold; }

        /* BUTTONS */
        .btn-glass {
            width: 100%; max-width: 300px; padding: 18px; margin: 10px auto;
            background: rgba(255, 255, 255, 0.2); border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 15px; color: white; font-size: 0.85rem; font-weight: bold;
            text-transform: uppercase; letter-spacing: 2px; cursor: pointer;
            backdrop-filter: blur(10px); display: block; transition: 0.2s;
        }
        .btn-orange { background: var(--orange); border: none; }

        /* GRID */
        .cabana-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; max-width: 500px; margin: 20px auto; }
        .cabana-card {
            background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px; padding: 12px 5px; min-height: 105px;
            display: flex; flex-direction: column; justify-content: space-between;
            backdrop-filter: blur(10px); color: white; transition: 0.2s;
        }

        /* MODALS */
        .modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); z-index: 5000; flex-direction: column;
            justify-content: center; align-items: center; backdrop-filter: blur(10px);
        }
        .modal-content {
            background: white; color: #333; padding: 25px; border-radius: 25px;
            width: 90%; max-width: 350px; text-align: left; max-height: 80vh; overflow-y: auto;
        }

        .admin-input {
            width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px;
            border: 1px solid #ddd; font-size: 1rem; box-sizing: border-box;
        }

        /* TASKS */
        .task-item {
            display: flex; align-items: center; background: #f8f8f8; 
            padding: 10px; border-radius: 10px; margin-bottom: 8px; font-size: 0.9rem;
        }
        .task-check { width: 18px; height: 18px; border: 2px solid var(--orange); border-radius: 4px; margin-right: 10px; cursor: pointer; }
        .task-done { text-decoration: line-through; opacity: 0.5; }

        /* COLORS */
        .color-row { display: flex; justify-content: space-between; margin: 15px 0; }
        .color-opt { width: 40px; height: 40px; border-radius: 50%; cursor: pointer; border: 2px solid #eee; }
        .color-opt.active { border: 3px solid var(--orange); transform: scale(1.1); }
        .st-free { background: var(--st-free); } .st-booked { background: var(--st-booked); } 
        .st-comp { background: var(--st-comp); } .st-event { background: var(--st-event); } .st-vip { background: var(--st-vip); }
    </style>
</head>
<body>

<div class="container">
    <div id="hero-screen">
        <div class="main-header">
            <h1>Cabana Booking</h1>
            <p>by Gulzada</p>
        </div>
        <button class="btn-glass btn-orange" onclick="showScreen('zones-screen')">Choose Zone</button>
        <button class="btn-glass" onclick="showModal('staff-modal')">Staff Board & Tasks</button>
        <button class="btn-glass" style="font-size:0.7rem; opacity:0.6;" onclick="showModal('info-modal')">Colors Info</button>
    </div>

    <div id="zones-screen" style="display:none;">
        <div class="main-header"><h1>Zones</h1></div>
        <button class="btn-glass" onclick="openZone('Escape', 21)">Escape</button>
        <button class="btn-glass" onclick="openZone('Lotus', 8)">Lotus</button>
        <button class="btn-glass" onclick="openZone('Joy Stone', 18)">Joy Stone</button>
        <button class="btn-glass" style="border:none; opacity:0.6;" onclick="showScreen('hero-screen')">← Back</button>
    </div>

    <div id="grid-screen" style="display:none;">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <button onclick="showScreen('zones-screen')" style="background:none; border:none; color:white; font-size:1.5rem;">←</button>
            <h2 id="zone-title" style="text-transform:uppercase; letter-spacing:3px; margin:0;"></h2>
            <div style="width:30px;"></div>
        </div>
        <div id="cabana-grid" class="cabana-grid"></div>
    </div>
</div>

<div id="staff-modal" class="modal">
    <div class="modal-content">
        <h3 style="margin-top:0; color:var(--orange);">Staff Board</h3>
        
        <p style="font-size:0.8rem; font-weight:bold; margin-bottom:5px;">Add Task:</p>
        <div style="display:flex; gap:5px; margin-bottom:15px;">
            <input type="text" id="task-input" class="admin-input" style="margin:0;" placeholder="What to do?">
            <button onclick="addTask()" style="background:var(--orange); color:white; border:none; border-radius:10px; padding:0 15px;">+</button>
        </div>
        
        <div id="task-list" style="max-height: 150px; overflow-y: auto; margin-bottom: 20px;"></div>

        <hr style="border:0; border-top:1px solid #eee; margin:20px 0;">
        
        <p style="font-size:0.8rem; font-weight:bold; margin-bottom:5px;">Change Background (URL):</p>
        <input type="text" id="bg-input" class="admin-input" placeholder="Paste image link here...">
        <button class="btn-glass btn-orange" style="max-width:100%; color:white; margin:0;" onclick="changeBg()">Apply Background</button>
        
        <button class="btn-glass" style="max-width:100%; color:#888; border:none;" onclick="closeModal('staff-modal')">Close</button>
    </div>
</div>

<div id="info-modal" class="modal" onclick="closeModal('info-modal')">
    <div class="modal-content" onclick="event.stopPropagation()">
        <h3>Legend</h3>
        <div style="margin:8px 0;"><span class="st-free" style="display:inline-block; width:15px; height:15px; border-radius:3px;"></span> Available</div>
        <div style="margin:8px 0;"><span class="st-booked" style="display:inline-block; width:15px; height:15px; border-radius:3px;"></span> Booked</div>
        <div style="margin:8px 0;"><span class="st-comp" style="display:inline-block; width:15px; height:15px; border-radius:3px;"></span> Comp</div>
        <div style="margin:8px 0;"><span class="st-event" style="display:inline-block; width:15px; height:15px; border-radius:3px;"></span> Event</div>
        <div style="margin:8px 0;"><span class="st-vip" style="display:inline-block; width:15px; height:15px; border-radius:3px;"></span> VIP</div>
        <button class="btn-glass btn-orange" style="max-width:100%; margin-top:15px; color:white;" onclick="closeModal('info-modal')">OK</button>
    </div>
</div>

<div id="admin-panel" class="modal">
    <div class="modal-content">
        <h3 id="admin-header">Edit</h3>
        <input type="text" id="in-room" class="admin-input" placeholder="Room Number">
        <input type="text" id="in-guest" class="admin-input" placeholder="Guest Name">
        <input type="text" id="in-seller" class="admin-input" placeholder="Sold by...">
        <div class="color-row">
            <div class="color-opt st-free" id="c-free" onclick="selectColor('free')"></div>
            <div class="color-opt st-booked" id="c-booked" onclick="selectColor('booked')"></div>
            <div class="color-opt st-comp" id="c-comp" onclick="selectColor('comp')"></div>
            <div class="color-opt st-event" id="c-event" onclick="selectColor('event')"></div>
            <div class="color-opt st-vip" id="c-vip" onclick="selectColor('vip')"></div>
        </div>
        <button class="btn-glass btn-orange" style="max-width:100%; color:white;" onclick="saveCabana()">Save</button>
        <button class="btn-glass" style="max-width:100%; color:#888; border:none;" onclick="closeModal('admin-panel')">Cancel</button>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('gz_db_v7')) || {};
    let tasks = JSON.parse(localStorage.getItem('gz_tasks_v7')) || [];
    let currentId = null;
    let selectedStatus = 'free';
    let czName = ''; let czCount = 0;

    // Инициализация фона
    if(localStorage.getItem('gz_bg')) document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${localStorage.getItem('gz_bg')}')`;

    function showScreen(id) {
        ['hero-screen', 'zones-screen', 'grid-screen'].forEach(s => document.getElementById(s).style.display='none');
        document.getElementById(id).style.display = 'block';
    }

    function showModal(id) { 
        if(id === 'staff-modal') renderTasks();
        document.getElementById(id).style.display = 'flex'; 
    }
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }

    function openZone(name, count) {
        czName = name; czCount = count;
        showScreen('grid-screen');
        document.getElementById('zone-title').innerText = name;
        renderGrid();
    }

    function renderGrid() {
        const grid = document.getElementById('cabana-grid');
        grid.innerHTML = '';
        for(let i=1; i<=czCount; i++) {
            let id = czName + i;
            let data = db[id] || { room: 'FREE', guest: '', seller: '', status: 'free' };
            grid.innerHTML += `<div class="cabana-card st-${data.status}" onclick="editCabana('${id}', ${i})">
                <span style="font-size:0.6rem; opacity:0.8; font-weight:bold;">#${i}</span>
                <span style="font-size:1.1rem; font-weight:900;">${data.room}</span>
                <span style="font-size:0.65rem; font-weight:bold;">${data.guest || ''}</span>
                <span style="font-size:0.55rem; opacity:0.7; border-top:1px solid rgba(255,255,255,0.1); padding-top:3px;">${data.seller ? 'By: '+data.seller : ''}</span>
            </div>`;
        }
    }

    function editCabana(id, num) {
        currentId = id;
        let data = db[id] || { room: '', guest: '', seller: '', status: 'free' };
        document.getElementById('admin-header').innerText = czName + ' #' + num;
        document.getElementById('in-room').value = data.room === 'FREE' ? '' : data.room;
        document.getElementById('in-guest').value = data.guest;
        document.getElementById('in-seller').value = data.seller;
        selectColor(data.status);
        showModal('admin-panel');
    }

    function selectColor(s) {
        selectedStatus = s;
        document.querySelectorAll('.color-opt').forEach(el => el.classList.remove('active'));
        document.getElementById('c-' + s).classList.add('active');
    }

    function saveCabana() {
        db[currentId] = {
            room: document.getElementById('in-room').value.toUpperCase() || 'FREE',
            guest: document.getElementById('in-guest').value,
            seller: document.getElementById('in-seller').value,
            status: selectedStatus
        };
        localStorage.setItem('gz_db_v7', JSON.stringify(db));
        closeModal('admin-panel');
        renderGrid();
    }

    // TASKS LOGIC
    function addTask() {
        const val = document.getElementById('task-input').value;
        if(!val) return;
        tasks.push({ text: val, done: false });
        localStorage.setItem('gz_tasks_v7', JSON.stringify(tasks));
        document.getElementById('task-input').value = '';
        renderTasks();
    }
    function renderTasks() {
        const list = document.getElementById('task-list');
        list.innerHTML = tasks.map((t, i) => `<div class="task-item" onclick="toggleTask(${i})">
            <div class="task-check" style="${t.done?'background:var(--orange)':''}"></div>
            <span class="${t.done?'task-done':''}">${t.text}</span>
        </div>`).join('');
    }
    function toggleTask(i) {
        tasks[i].done = !tasks[i].done;
        localStorage.setItem('gz_tasks_v7', JSON.stringify(tasks));
        renderTasks();
    }

    // BG CHANGE
    function changeBg() {
        const link = document.getElementById('bg-input').value;
        if(link) {
            document.body.style.backgroundImage = `linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('${link}')`;
            localStorage.setItem('gz_bg', link);
            alert("Background changed!");
        }
    }
</script>
</body>
</html>
