<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CABANA SPACE | GULZADA FIXED</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --sand-bg: #F6F2EA; --white: #FFFFFF; --olive: #7D8B6A; --charcoal: #2C2C2C;
            --st-booked: #FF4B2B; --st-free: #FFFFFF; --st-villas: #A020F0; --st-comp: #FFD700;
        }
        body { margin: 0; font-family: -apple-system, sans-serif; background-color: var(--sand-bg); padding-bottom: 30px; }
        .header { padding: 30px 20px; text-align: center; }
        .header h1 { font-size: 1.8rem; letter-spacing: 4px; text-transform: uppercase; margin: 0; font-weight: 900; }
        .daily-section { padding: 0 20px 20px; }
        .daily-card { background: var(--white); padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); cursor: pointer; border: 2px solid var(--olive); }
        .nav-area { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-luxe { background: var(--olive); color: white; padding: 18px; border-radius: 40px; display: flex; justify-content: space-between; align-items: center; font-weight: 900; border: none; width: 100%; font-size: 0.9rem; }
        .btn-info { background: var(--white); color: var(--olive); border: 2px solid var(--olive); margin-top: 10px; }
        .cabana-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px; }
        .cab-card { border-radius: 15px; padding: 10px 5px; text-align: center; min-height: 120px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .cab-title { font-size: 0.75rem; font-weight: 900; text-transform: uppercase; }
        .cab-room { font-size: 1.1rem; font-weight: 900; display: block; margin: 5px 0; }
        .cab-sticker { font-size: 1.3rem; }
        .st-booked { background: var(--st-booked); color: white; }
        .st-free { background: var(--st-free); color: var(--charcoal); border: 1px solid #ddd; }
        .st-villas { background: var(--st-villas); color: white; }
        .st-comp { background: var(--st-comp); color: black; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 999; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; padding: 25px; border-radius: 30px; max-height: 80vh; overflow-y: auto; }
        .input-luxe { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 1rem; }
    </style>
</head>
<body>

    <div id="home-view">
        <header class="header"><h1>CABANA SPACE</h1></header>
        <div class="daily-section">
            <div class="daily-card" onclick="editDaily()">
                <small style="color:var(--olive); font-weight:bold;">DAILY NOTES 📝</small>
                <div id="daily-val" style="font-weight: 700;">Loading...</div>
            </div>
        </div>
        <nav class="nav-area">
            <button class="btn-luxe" onclick="openZone('Escape', 21)">ESCAPE AREA <span>🌊</span></button>
            <button class="btn-luxe" onclick="openZone('Lotus', 8)">LOTUS PIER <span>🪷</span></button>
            <button class="btn-luxe" onclick="openZone('JoyStone', 18)">JOYSTONE ZONE <span>💎</span></button>
            <button class="btn-luxe btn-info" onclick="toggleModal('info-modal', true)">SYSTEM INFORMATION <span>ℹ️</span></button>
        </nav>
    </div>

    <div id="zone-view" style="display:none;">
        <div style="padding:20px; display:flex; align-items:center; gap:15px;">
            <button onclick="goHome()" style="font-size:1.5rem; background:none; border:none;">← Назад</button>
            <h2 id="zone-title" style="margin:0;"></h2>
        </div>
        <div id="cabana-grid" class="cabana-grid"></div>
    </div>

    <div id="info-modal" class="modal" onclick="toggleModal('info-modal', false)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <h3>GUIDE & STICKERS</h3>
            <p>🟥 Booked | ⬜ Free | 🟪 Villas | 🟨 Comp</p>
            <hr>
            <p>🎂 Birthday | ⭐ VIP | ❤️ Honeymoon<br>⚠️ Allergy | 🍉 Fruits | 🧸 Family<br>🔕 Quiet | 🧊 Ice | 🌊 Front Row<br>🚫 No Swim | ♿ Special | 🥂 Celeb</p>
            <button onclick="toggleModal('info-modal', false)" style="width:100%; padding:15px; background:var(--olive); color:white; border-radius:15px; border:none; font-weight:bold;">CLOSE</button>
        </div>
    </div>

    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h3 id="edit-header">EDIT</h3>
            <input type="text" id="in-room" class="input-luxe" placeholder="Room Number">
            <input type="text" id="in-guest" class="input-luxe" placeholder="Guest Name">
            <input type="text" id="in-seller" class="input-luxe" placeholder="Sold by">
            <select id="in-sticker" class="input-luxe">
                <option value="">No Sticker</option>
                <option value="🎂">🎂 Birthday</option><option value="⭐">⭐ VIP</option><option value="❤️">❤️ Honeymoon</option>
                <option value="⚠️">⚠️ Allergy</option><option value="🍉">🍉 Fruits</option><option value="🧸">🧸 Family</option>
                <option value="🔕">🔕 Quiet</option><option value="🧊">🧊 Ice</option><option value="🌊">🌊 Front Row</option>
                <option value="🚫">🚫 No Swimming</option><option value="♿">♿ Special Needs</option><option value="🥂">🥂 Celebration</option>
            </select>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button onclick="setSt('free')" id="b-free" style="flex:1; height:40px; background:white; border:1px solid #ccc;"></button>
                <button onclick="setSt('booked')" id="b-booked" style="flex:1; height:40px; background:var(--st-booked); border:none;"></button>
                <button onclick="setSt('villas')" id="b-villas" style="flex:1; height:40px; background:var(--st-villas); border:none;"></button>
                <button onclick="setSt('comp')" id="b-comp" style="flex:1; height:40px; background:var(--st-comp); border:none;"></button>
            </div>
            <button onclick="saveToCloud()" style="width:100%; padding:18px; background:var(--olive); color:white; border:none; border-radius:15px; font-weight:bold;">SAVE CHANGES</button>
            <button onclick="toggleModal('edit-modal', false)" style="width:100%; background:none; border:none; margin-top:10px; color:gray;">Cancel</button>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ ИЗ СКРИНШОТА
        const firebaseConfig = {
            apiKey: "AIzaSyB9RaIynSU_EMATYOq8xCT2uySn...",
            databaseURL: "https://cabanaspace-default-rtdb.firebaseio.com/", 
            projectId: "cabanaspace"
        };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        let czName, czCount, currentId, selectedStatus = 'free';

        // Загрузка заметок
        db.ref('notes').on('value', s => { document.getElementById('daily-val').innerText = s.val() || "No notes"; });

        function editDaily() {
            let val = prompt("Enter notes:", document.getElementById('daily-val').innerText);
            if(val !== null) db.ref('notes').set(val);
        }

        function openZone(name, count) {
            czName = name; czCount = count;
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('zone-view').style.display = 'block';
            document.getElementById('zone-title').innerText = name;
            
            db.ref('zones/' + name).on('value', s => {
                const data = s.val() || {};
                const grid = document.getElementById('cabana-grid');
                grid.innerHTML = '';
                for(let i=1; i<=count; i++) {
                    let c = data[i] || { room: 'EMPTY', status: 'free', sticker: '' };
                    grid.innerHTML += `
                        <div class="cab-card st-${c.status}" onclick="prepareEdit(${i}, '${c.room}', '${c.status}', '${c.sticker}', '${c.guest}', '${c.seller}')">
                            <span class="cab-title">${name} ${i}</span>
                            <span class="cab-room">${c.room}</span>
                            <span class="cab-sticker">${c.sticker || ''}</span>
                        </div>`;
                }
            });
        }

        function prepareEdit(id, room, status, sticker, guest, seller) {
            currentId = id;
            document.getElementById('in-room').value = room === 'EMPTY' ? '' : room;
            document.getElementById('in-guest').value = guest || '';
            document.getElementById('in-seller').value = seller || '';
            document.getElementById('in-sticker').value = sticker || '';
            setSt(status);
            toggleModal('edit-modal', true);
        }

        function setSt(s) {
            selectedStatus = s;
            ['free','booked','villas','comp'].forEach(x => {
                document.getElementById('b-'+x).style.outline = (x === s) ? '3px solid black' : 'none';
            });
        }

        function saveToCloud() {
            db.ref('zones/' + czName + '/' + currentId).set({
                room: document.getElementById('in-room').value || 'EMPTY',
                guest: document.getElementById('in-guest').value,
                seller: document.getElementById('in-seller').value,
                sticker: document.getElementById('in-sticker').value,
                status: selectedStatus
            });
            toggleModal('edit-modal', false);
        }

        function toggleModal(id, show) { document.getElementById(id).style.display = show ? 'flex' : 'none'; }
        function goHome() { document.getElementById('home-view').style.display = 'block'; document.getElementById('zone-view').style.display = 'none'; }
    </script>
</body>
</html>
