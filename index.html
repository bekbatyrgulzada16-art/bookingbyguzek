<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cabana Booking</title>
<style>
    body {
        font-family: 'Inter', sans-serif;
        background: #F5F5F5;
        margin: 0;
        padding: 20px;
        color: #333;
    }
    h1 {
        text-align: center;
        font-size: 32px;
        margin-bottom: 20px;
        color: #4A4A4A;
    }
    .section {
        background: #fff;
        padding: 15px;
        border-radius: 12px;
        margin-bottom: 15px;
        box-shadow: 0 4px 10px rgba(0,0,0,0.08);
    }
    .section h2 {
        margin: 0;
        cursor: pointer;
        color: #677D73;
    }
    .content {
        display: none;
        margin-top: 15px;
    }
    .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill,minmax(100px,1fr));
        gap: 10px;
    }
    .cell {
        background: #E9E7E2;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
        cursor: pointer;
        position: relative;
        border: 2px solid transparent;
        transition: 0.2s;
        font-size: 14px;
    }
    .cell:hover {
        transform: scale(1.05);
    }
    .emoji {
        display: block;
        font-size: 20px;
        margin-bottom: 5px;
    }
    .status-free { background:#A7CFA5; border-color:#8FA79C; }
    .status-booked { background:#E26D6D; border-color:#C55B5B; }
    .status-complimentary { background:#E8D27C; border-color:#C9B35C; }
    .status-event { background:#7DAAE3; border-color:#5F88C0; }
    .modal {
        display:none;
        position:fixed;
        top:0; left:0; width:100%; height:100%;
        background: rgba(0,0,0,0.4);
        justify-content:center;
        align-items:center;
    }
    .modal-content {
        background:#fff;
        padding:20px;
        border-radius:12px;
        width:300px;
    }
    label { display:block; margin-top:10px; font-weight:bold; }
    input, select, textarea { width:100%; margin-top:5px; padding:5px; border-radius:5px; border:1px solid #ccc; }
    button { margin-top:10px; padding:8px 12px; border:none; border-radius:6px; background:#677D73; color:#fff; cursor:pointer; }
</style>
</head>
<body>

<h1>Cabana Booking</h1>

<!-- Board -->
<div class="section">
<h2 onclick="toggle('board')">📌 Board / Announcements</h2>
<div class="content" id="board">
    <textarea id="boardText" placeholder="Write announcements here..." rows="5"></textarea>
    <button onclick="saveBoard()">Save</button>
</div>
</div>

<!-- Function to toggle sections -->
<script>
function toggle(id){
    const el=document.getElementById(id);
    el.style.display = el.style.display==='block'?'none':'block';
}
</script>

<!-- CABANAS -->
<div id="cabanaSections"></div>

<!-- Modal for editing cell -->
<div class="modal" id="modal">
    <div class="modal-content">
        <h3>Edit Cabana</h3>
        <label>Room Number</label>
        <input type="text" id="modalRoom">
        <label>Sold By</label>
        <input type="text" id="modalSold">
        <label>Status</label>
        <select id="modalStatus">
            <option value="free">Free / Boş</option>
            <option value="booked">Booked / Rezerve</option>
            <option value="complimentary">Complimentary / İkram</option>
            <option value="event">Event / Etkinlik</option>
        </select>
        <label>Emoji / Sticker</label>
        <select id="modalEmoji">
            <option value="">None</option>
            <option value="♿">Wheelchair / Engelli</option>
            <option value="🌶️">Spicy Allergy / Acılı alerji</option>
            <option value="🤧">Allergy / Alerji</option>
            <option value="🔇">Likes Silence / Sessizliği sever</option>
            <option value="🚭">Non-smoker / Sigara içmez</option>
            <option value="👶">Kids / Çocuklu</option>
            <option value="💍">Honeymoon / Balayı</option>
            <option value="🎂">Birthday / Doğum günü</option>
            <option value="⭐">VIP / VIP</option>
            <option value="🧼">Cleaning / Temizlik</option>
            <option value="💌">Special request / Özel istek</option>
            <option value="👵">Elderly guest / Yaşlı misafir</option>
            <option value="💦">Needs water / Sık su ister</option>
            <option value="🍼">Baby needs / Bebek ihtiyaçları</option>
            <option value="🍉">Fruit plate / Meyve tabağı</option>
            <option value="🧳">Late checkout / Geç çıkış</option>
            <option value="📵">Do not disturb / Rahatsız etmeyin</option>
        </select>
        <label>Notes</label>
        <textarea id="modalNotes" rows="3"></textarea>
        <button onclick="saveCell()">Save</button>
    </div>
</div>

<script>
// DATA
const cabanasData = [
    {name:'Escape', count:21},
    {name:'Lotus', count:8},
    {name:'Joystone', count:18}
];

// Load from localStorage or initialize
let cabanas = JSON.parse(localStorage.getItem('cabanas')) || {};
cabanasData.forEach(sec=>{
    if(!cabanas[sec.name]){
        cabanas[sec.name] = [];
        for(let i=1;i<=sec.count;i++){
            cabanas[sec.name].push({room:'', sold:'', status:'free', emoji:'', notes:''});
        }
    }
});

// BOARD
document.getElementById('boardText').value = localStorage.getItem('board')||'';
function saveBoard(){
    localStorage.setItem('board',document.getElementById('boardText').value);
    alert('Saved!');
}

// Render cabanas
const cabanaSections = document.getElementById('cabanaSections');
cabanasData.forEach(sec=>{
    const sectionDiv = document.createElement('div');
    sectionDiv.className='section';
    sectionDiv.innerHTML = `<h2 onclick="toggle('${sec.name}')">🏝️ ${sec.name}</h2><div class="content" id="${sec.name}"><div class="grid"></div></div>`;
    cabanaSections.appendChild(sectionDiv);
    renderGrid(sec.name);
});

function renderGrid(secName){
    const grid = document.getElementById(secName).querySelector('.grid');
    grid.innerHTML='';
    cabanas[secName].forEach((c,i)=>{
        const cell = document.createElement('div');
        cell.className='cell status-'+c.status;
        cell.innerHTML=`<span class="emoji">${c.emoji}</span>${secName} ${i+1}<br>Room: ${c.room||'-'}<br>Sold by: ${c.sold||'-'}`;
        cell.onclick=()=>openModal(secName,i);
        grid.appendChild(cell);
    });
}

// Modal functions
let currentSec,currentIndex;
function openModal(sec,i){
    currentSec=sec; currentIndex=i;
    const c=cabanas[sec][i];
    document.getElementById('modalRoom').value=c.room;
    document.getElementById('modalSold').value=c.sold;
    document.getElementById('modalStatus').value=c.status;
    document.getElementById('modalEmoji').value=c.emoji;
    document.getElementById('modalNotes').value=c.notes;
    document.getElementById('modal').style.display='flex';
}
function saveCell(){
    const c=cabanas[currentSec][currentIndex];
    c.room=document.getElementById('modalRoom').value;
    c.sold=document.getElementById('modalSold').value;
    c.status=document.getElementById('modalStatus').value;
    c.emoji=document.getElementById('modalEmoji').value;
    c.notes=document.getElementById('modalNotes').value;
    localStorage.setItem('cabanas',JSON.stringify(cabanas));
    renderGrid(currentSec);
    document.getElementById('modal').style.display='none';
}
document.getElementById('modal').onclick=function(e){
    if(e.target==this)this.style.display='none';
}
</script>

</body>
</html>
