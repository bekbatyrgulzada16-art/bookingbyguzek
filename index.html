<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CABANA BOOKING BY GULZADA</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    <style>
        :root { --sand: #F6F2EA; --olive: #7D8B6A; --red: #FF4B2B; --purp: #A020F0; --gold: #FFD700; }
        body { margin: 0; font-family: sans-serif; background: var(--sand); padding-bottom: 30px; }
        .header { padding: 30px 20px; text-align: center; font-weight: 900; text-transform: uppercase; }
        .daily-section { padding: 0 20px 20px; }
        .daily-card { background: white; padding: 20px; border-radius: 20px; border: 2px solid var(--olive); font-weight: 800; cursor: pointer; }
        .nav-area { padding: 0 20px; display: flex; flex-direction: column; gap: 10px; }
        .btn-luxe { background: var(--olive); color: white; padding: 20px; border-radius: 40px; border: none; font-weight: 900; display: flex; justify-content: space-between; font-size: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; }
        .card { background: white; border-radius: 18px; padding: 10px; text-align: center; min-height: 140px; display: flex; flex-direction: column; justify-content: space-between; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border: 2px solid transparent; }
        
        /* Статусы */
        .st-booked { background: var(--red) !important; color: white; }
        .st-villas { background: var(--purp) !important; color: white; }
        .st-comp { background: var(--gold) !important; color: black; }
        .st-free { background: white; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 90%; padding: 25px; border-radius: 30px; box-sizing: border-box; }
        input, select { width: 100%; padding: 14px; margin-bottom: 10px; border-radius: 12px; border: 1px solid #ddd; font-weight: 700; font-size: 1rem; box-sizing: border-box; }
    </style>
</head>
<body>

<div id="home">
    <div class="header"><h1>CABANA BOOKING<br>BY GULZADA</h1></div>
    <div class="daily-section"><div class="daily-card" onclick="editDaily()"><small>DAILY NOTES 📝</small><div id="daily-val">Loading...</div></div></div>
    <div class="nav-area">
        <button class="btn-luxe" onclick="render('Escape', 21)">ESCAPE AREA <span>🌊</span></button>
        <button class="btn-luxe" onclick="render('Lotus', 8)">LOTUS PIER <span>🪷</span></button>
        <button class="btn-luxe" onclick="render('JoyStone', 18)">JOYSTONE ZONE <span>💎</span></button>
    </div>
</div>

<div id="zone" style="display:none;">
    <div style="padding:20px; display:flex; align-items:center; gap:15px;"><button onclick="location.reload()" style="background:none; border:none; font-size:2rem;">←</button><h2 id="z-title" style="margin:0; font-weight:900;"></h2></div>
    <div id="grid" class="grid"></div>
</div>

<div id="edit" class="modal">
    <div class="modal-content">
        <h3 id="e-title">EDIT</h3>
        <input type="text" id="i-room" placeholder="Room Number">
        <input type="text" id="i-guest" placeholder="Guest Name">
        <input type="text" id="i-seller" placeholder="Sold by">
        <select id="i-sticker">
            <option value="">No Sticker</option>
            <option value="🎂">🎂 Birthday</option><option value="⭐">⭐ VIP</option><option value="❤️">❤️ Honeymoon</option><option value="⚠️">⚠️ Allergy</option><option value="🍉">🍉 Fruits</option><option value="🧸">🧸 Family</option><option value="🔕">🔕 Quiet</option><option value="🧊">🧊 Ice</option><option value="🌊">🌊 Front Row</option><option value="🚫">🚫 No Swim</option>
        </select>
        <select id="i-status">
            <option value="free">Boş / Free (White)</option>
            <option value="booked">Dolu / Booked (Red)</option>
            <option value="villas">Villas (Purple)</option>
            <option value="comp">Comp (Yellow)</option>
        </select>
        <button onclick="save()" style="width:100%; padding:20px; background:var(--olive); color:white; border-radius:15px; border:none; font-weight:900; font-size:1.1rem;">SAVE CHANGES</button>
        <button onclick="document.getElementById('edit').style.display='none'" style="width:100%; background:none; border:none; margin-top:15px; color:#999; font-weight:700;">Cancel</button>
    </div>
</div>

<script>
    const config = { 
        apiKey: "AIzaSyB9RaIynSU_EMATYOq8xCT2uySnV-2k6G8", 
        databaseURL: "https://cabanaspace-default-rtdb.firebaseio.com", 
        projectId: "cabanaspace" 
    };
    firebase.initializeApp(config);
    const db = firebase.database();
    let curZ, curI;

    db.ref('notes').on('value', s => { document.getElementById('daily-val').innerText = s.val() || "Tap to add notes..."; });

    function render(name, count) {
        curZ = name;
        document.getElementById('home').style.display = 'none';
        document.getElementById('zone').style.display = 'block';
        document.getElementById('z-title').innerText = name;
        const g = document.getElementById('grid');
        g.innerHTML = '';
        
        // Рисуем пустые ячейки сразу
        for(let i=1; i<=count; i++) {
            g.innerHTML += `<div id="c-${i}" class="card" onclick="openE(${i})"><small>${name} ${i}</small><b id="r-${i}">FREE</b><span id="g-${i}" style="font-size:0.75rem"></span><span id="sl-${i}" style="font-size:0.7rem; opacity:0.7"></span><span id="s-${i}" style="font-size:1.5rem"></span></div>`;
        }

        // Подгружаем реальные данные из базы
        db.ref('zones/'+name).on('value', snap => {
            const data = snap.val() || {};
            for(let i=1; i<=count; i++) {
                const c = data[i] || {room:'', status:'free', sticker:'', guest:'', seller:''};
                const el = document.getElementById('c-'+i);
                el.className = 'card st-' + c.status;
                document.getElementById('r-'+i).innerText = c.room || 'FREE';
                document.getElementById('g-'+i).innerText = c.guest || '';
                document.getElementById('sl-'+i).innerText = c.seller || '';
                document.getElementById('s-'+i).innerText = c.sticker || '';
            }
        });
    }

    function openE(id) {
        curI = id;
        document.getElementById('e-title').innerText = curZ + ' #' + id;
        // Предзаполняем поля текущими данными из карточки
        document.getElementById('i-room').value = document.getElementById('r-'+id).innerText === 'FREE' ? '' : document.getElementById('r-'+id).innerText;
        document.getElementById('i-guest').value = document.getElementById('g-'+id).innerText;
        document.getElementById('i-seller').value = document.getElementById('sl-'+id).innerText;
        document.getElementById('i-sticker').value = document.getElementById('s-'+id).innerText;
        document.getElementById('edit').style.display = 'flex';
    }

    function save() {
        // ЗАПИСЫВАЕМ ДАННЫЕ В БАЗУ
        const dataToSave = {
            room: document.getElementById('i-room').value,
            guest: document.getElementById('i-guest').value,
            seller: document.getElementById('i-seller').value,
            sticker: document.getElementById('i-sticker').value,
            status: document.getElementById('i-status').value
        };
        
        db.ref('zones/'+curZ+'/'+curI).set(dataToSave).then(() => {
            document.getElementById('edit').style.display = 'none';
        }).catch(err => alert("Error saving: " + err));
    }

    function editDaily() { 
        let v = prompt("Daily Notes:", document.getElementById('daily-val').innerText); 
        if(v !== null) db.ref('notes').set(v); 
    }
</script>
</body>
</html>
